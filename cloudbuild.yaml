steps:
  # 1. Build the Docker image using cache to speed up subsequent builds
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/terradrishti-engine:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/terradrishti-engine:latest',
      '.'
    ]
 
  # 2. Push the newly built image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/terradrishti-engine:$COMMIT_SHA']
 
  # 3. Deploy the container image directly to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'test-terradrishti' # ⚠️ Replace with your actual service name
      - '--image'
      - 'gcr.io/$PROJECT_ID/terradrishti-engine:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'                 # ⚠️ Replace with your actual GCP region (e.g., asia-south1 for Mumbai)
      - '--platform'
      - 'managed'
 
images:
  - 'gcr.io/$PROJECT_ID/terradrishti-engine:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/terradrishti-engine:latest'