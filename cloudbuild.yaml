steps:
  # 1. Pull the 'latest' image to use as a layer cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:latest || exit 0

  # 2. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--cache-from', 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:latest',
      '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:$COMMIT_SHA',
      '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:latest',
      '.'
    ]
 
  # 3. 👇 PUSH THE IMAGE EXPLICITLY SO CLOUD RUN CAN SEE IT
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:$COMMIT_SHA']

  # 4. Deploy to Cloud Run (Now it will find the image!)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'test-terradrishti'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
 
# Keeps track of artifacts and ensures the 'latest' tag also gets pushed at the very end
images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/terradrishti-repo/terradrishti-engine:latest'

options:
  logging: CLOUD_LOGGING_ONLY